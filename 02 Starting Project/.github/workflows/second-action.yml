name: Test Project
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code from the repository
        uses: actions/checkout@v6
      - name: Install NodeJS
        uses: actions/setup-node@6.2.0
        with:
          node-version: 20.20.0
      - name: Install dependencies
        run: npm ci
